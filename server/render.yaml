services:
  - type: web
    name: circle-funds-api
    env: node
    region: singapore
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGO_URI
        sync: false        # Set in Render dashboard — never commit this
      - key: JWT_SECRET
        sync: false        # Set in Render dashboard — never commit this
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: CLIENT_URL
        sync: false        # Set to your Vercel domain
